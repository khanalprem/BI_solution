events {
    worker_connections 1024;
}

http {
    upstream backend {
        server backend:3000;
    }

    upstream frontend {
        server frontend:3000;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=web_limit:10m rate=30r/s;

    # Server block for API
    server {
        listen 80;
        server_name api.bankbi.local;

        # API rate limiting
        limit_req zone=api_limit burst=20 nodelay;

        # Logging
        access_log /var/log/nginx/api_access.log;
        error_log /var/log/nginx/api_error.log;

        # Proxy settings
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # API endpoints
        location /api/ {
            proxy_pass http://backend/api/;
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
        }

        # Health check
        location /health {
            proxy_pass http://backend/health;
        }

        # API documentation
        location /api-docs {
            proxy_pass http://backend/api-docs;
        }
    }

    # Server block for Frontend
    server {
        listen 80;
        server_name bankbi.local www.bankbi.local;

        # Web rate limiting
        limit_req zone=web_limit burst=50 nodelay;

        # Logging
        access_log /var/log/nginx/web_access.log;
        error_log /var/log/nginx/web_error.log;

        # Proxy settings
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

        # Next.js frontend
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
        }

        # Next.js static files
        location /_next/static/ {
            proxy_pass http://frontend/_next/static/;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, immutable";
        }

        # Next.js images
        location /_next/image {
            proxy_pass http://frontend/_next/image;
            proxy_cache_valid 200 7d;
            add_header Cache-Control "public, max-age=604800";
        }

        # Static assets
        location /static/ {
            proxy_pass http://frontend/static/;
            proxy_cache_valid 200 30d;
            add_header Cache-Control "public, max-age=2592000";
        }
    }

    # SSL configuration (uncomment for production with SSL)
    # server {
    #     listen 443 ssl http2;
    #     server_name api.bankbi.com;
    #
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #
    #     # ... rest of API configuration
    # }
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name bankbi.com www.bankbi.com;
    #
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #
    #     # ... rest of frontend configuration
    # }
    #
    # # Redirect HTTP to HTTPS
    # server {
    #     listen 80;
    #     server_name bankbi.com www.bankbi.com api.bankbi.com;
    #     return 301 https://$host$request_uri;
    # }
}
