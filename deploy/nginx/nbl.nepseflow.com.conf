# /etc/nginx/sites-available/nbl.nepseflow.com
# Symlink to sites-enabled, then `sudo nginx -t && sudo systemctl reload nginx`.
#
# Upstream ports match docker-compose.prod.yml (bound to 127.0.0.1).
#   3100 -> Next.js frontend
#   3101 -> Rails backend

upstream nbl_frontend {
    server 127.0.0.1:3100;
    keepalive 32;
}

upstream nbl_backend {
    server 127.0.0.1:3101;
    keepalive 32;
}

# HTTP -> HTTPS redirect (also leaves room for the ACME http-01 challenge)
server {
    listen 80;
    listen [::]:80;
    server_name nbl.nepseflow.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name nbl.nepseflow.com;

    # Filled in by `certbot --nginx` on first run; do not hand-edit these paths.
    ssl_certificate     /etc/letsencrypt/live/nbl.nepseflow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nbl.nepseflow.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (Rails sets these too in production.rb; nginx is belt+braces)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25m;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    # Rails API
    location /api/ {
        proxy_pass http://nbl_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # ActionCable (only if you wire it up; harmless to leave)
    location /cable {
        proxy_pass http://nbl_backend;
        proxy_http_version 1.1;
        proxy_set_header Host       $host;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # Next.js static chunks - long cache, never proxy_buffering issues
    location /_next/static/ {
        proxy_pass http://nbl_frontend;
        proxy_set_header Host $host;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Everything else -> Next.js
    location / {
        proxy_pass http://nbl_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
