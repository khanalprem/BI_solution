# Mounted at /etc/nginx/conf.d/default.conf inside the bankbi nginx:alpine
# container (see docker-compose.prod.yml). nginx:alpine's main nginx.conf
# already supplies events{} and http{}, so this file lives in http context —
# put map/upstream/server here directly, no wrappers.
#
# Listen port:           container :443  (host :8443 maps to it)
# Demo URL:              https://nbl.nepseflow.com:8443
# Cert source:           /etc/letsencrypt mounted from host (read-only)
# Upstream resolution:   container DNS — services on the nbl_net network

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream nbl_frontend {
    server frontend:3000;
    keepalive 32;
}

upstream nbl_backend {
    server backend:3000;
    keepalive 32;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name nbl.nepseflow.com;

    server_tokens off;

    ssl_certificate     /etc/letsencrypt/live/nbl.nepseflow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nbl.nepseflow.com/privkey.pem;

    # Inlined to avoid depending on certbot-nginx's options-ssl-nginx.conf
    # being present on the host.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 5m;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json
               application/javascript application/xml+rss image/svg+xml;

    # Rails API. $http_host preserves the client's "host:port" so Rails
    # generates correct absolute URLs while we're on the non-standard port.
    location /api/ {
        proxy_pass http://nbl_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # ActionCable / WebSocket (harmless if unused)
    location /cable {
        proxy_pass http://nbl_backend;
        proxy_http_version 1.1;
        proxy_set_header Host       $http_host;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    # Next.js immutable static chunks. Note: any add_header here REPLACES the
    # server-level set, so we re-emit the four security headers.
    location /_next/static/ {
        proxy_pass http://nbl_frontend;
        proxy_set_header Host $http_host;
        proxy_cache_valid 200 365d;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Everything else -> Next.js
    location / {
        proxy_pass http://nbl_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
    }
}
